<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D20 noppa</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: white;
    }
    .app { text-align: center; padding: 2rem; }
    .die {
      width: 180px; height: 180px;
      margin: 0 auto 1.5rem;
      display: grid; place-items: center;
      border-radius: 28px;
      background: linear-gradient(145deg, #374151, #1f2937);
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      font-size: 5rem; font-weight: 800;
    }
    .die.rolling { transform: rotate(8deg) scale(1.05); }
    button {
      font-size: 1.25rem;
      padding: .9rem 1.4rem;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      background: #facc15;
      color: #111827;
    }
    .history { margin-top: 1.5rem; color: #d1d5db; }
  </style>
</head>
<body>
  <main class="app">
    <div id="die" class="die">20</div>
    <button id="rollButton">Heitä d20</button>
    <div id="history" class="history">Edelliset heitot: –</div>
  </main>

  <script>
    const die = document.getElementById("die");
    const button = document.getElementById("rollButton");
    const historyEl = document.getElementById("history");
    const history = [];

    function rollD20() {
      die.classList.add("rolling");
      let ticks = 0;

      const animation = setInterval(() => {
        die.textContent = Math.floor(Math.random() * 20) + 1;
        ticks++;

        if (ticks >= 12) {
          clearInterval(animation);
          const result = Math.floor(Math.random() * 20) + 1;
          die.textContent = result;
          die.classList.remove("rolling");

          history.unshift(result);
          history.splice(10);
          historyEl.textContent = "Edelliset heitot: " + history.join(", ");
        }
      }, 45);
    }

    button.addEventListener("click", rollD20);
  </script>
</body>
</html>
